<!DOCTYPE html>
<html>
<head>
    <title>Simple Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { max-width: 100%; height: 150px; object-fit: cover; }
        .cart { margin-top: 30px; border-top: 2px solid #000; padding-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h2>🏪 線上訂貨系統</h2>
        
        <label>選擇下單分店：</label>
        <select v-model="branch" required>
            <option value="">--請選擇--</option>
            <option value="台北店">台北店</option>
            <option value="台中店">台中店</option>
            <option value="高雄店">高雄店</option>
        </select>

        <hr>

        <div class="product-grid">
            <div v-for="p in products" class="card">
                <img :src="p.img" alt="product">
                <h3>{{ p.name }}</h3>
                <p>${{ p.price }}</p>
                <button @click="addToCart(p)">加入購物車</button>
            </div>
        </div>

        <div class="cart" v-if="cart.length > 0">
            <h3>🛒 訂單明細</h3>
            <ul>
                <li v-for="item in cart">{{ item.name }} x {{ item.qty }} - ${{ item.price * item.qty }}</li>
            </ul>
            <h4>總金額: ${{ total }}</h4>
            <button @click="submitOrder" :disabled="!branch">確認下單</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrS1bKFjFvv72OKxj6_iRHsUZCLqRFnllf3Espfiex4n7ZPN3P4bNBG_vb1Ogoh9_3eH11K8piK_Uz_70qk1TaM9RdR2tydVYO4mFQyehFP2E9cswnIlEQlzkzVkt5u9RJrNJBMS7zNBeigeQ3wLGukY765HLqGA3-cwi08RLSJKL4T0X07iM_oQJzVKcfKPalp7PtOnV7bW9ubp5Rcex0xfzrKhV7FkkDR6c3L9VfSMklJytq9oJaIONFVP43bBQ_POuLokK6NgpNjpbDNElgCZNNYbj7kDzdUAj3CJ&lib=MR907bacWbJYcMwdiGhxyKFOksWqMknLT';

        new Vue({
            el: '#app',
            data: {
                branch: '',
                products: [],
                cart: []
            },
            computed: {
                total() { return this.cart.reduce((sum, item) => sum + (item.price * item.qty), 0); }
            },
            mounted() {
                fetch(API_URL).then(res => res.json()).then(data => this.products = data);
            },
            methods: {
                addToCart(p) {
                    const item = this.cart.find(i => i.name === p.name);
                    if (item) item.qty++;
                    else this.cart.push({...p, qty: 1});
                },
                submitOrder() {
                    const orderData = {
                        branch: this.branch,
                        items: this.cart.map(i => `${i.name}(${i.qty})`).join(', '),
                        total: this.total
                    };
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(orderData)
                    }).then(() => {
                        alert('訂單已送出！');
                        this.cart = [];
                        this.branch = '';
                    });
                }
            }
        });
    </script>
</body>
</html>
